apiVersion: v1
kind: Namespace
metadata:
  name: rbac-therapist-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-therapist-controller-manager
  namespace: rbac-therapist-system
  labels:
    app.kubernetes.io/name: rbac-therapist
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbac-therapist
        control-plane: controller-manager
    spec:
      serviceAccountName: rbac-therapist-controller-manager
      containers:
        - name: manager
          image: rbac-therapist/operator:ci
          imagePullPolicy: IfNotPresent
          command: ["/operator"]
          args:
            - --leader-elect=false
            - --enable-webhooks=false
            - --session-refresh-interval=30s
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
