apiVersion: v1
kind: Namespace
metadata:
  name: workflow-ops
  labels:
    platform: workflow
    env: production
---
apiVersion: rbac.therapist.io/v1alpha1
kind: Team
metadata:
  name: workflow-operators-e2e
spec:
  description: Workflow operators used by e2e managed-rbac validation.
  members:
    - kind: Group
      name: workflow-operators@acme.com
---
apiVersion: rbac.therapist.io/v1alpha1
kind: AccessPolicy
metadata:
  name: workflow-managed-rbac-e2e
spec:
  rationale: >
    E2E fixture validating AccessPolicy-managed Role/ClusterRole lifecycle plus
    RoleBinding reconciliation from those managed role definitions.
  subjects:
    - teamRef:
        name: workflow-operators-e2e
  managedClusterRoles:
    - name: workflow-controller-reader-e2e
      rules:
        - apiGroups: ["argoproj.io"]
          resources: ["workflows", "workflowtemplates"]
          verbs: ["get", "list", "watch"]
  managedRoles:
    - name: workflow-secret-reader-e2e
      namespace: workflow-ops
      rules:
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get", "list"]
  roles:
    - clusterRole: workflow-controller-reader-e2e
      namespaces:
        names:
          - workflow-ops
    - role: workflow-secret-reader-e2e
      namespaces:
        names:
          - workflow-ops
