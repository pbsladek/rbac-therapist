apiVersion: rbac.therapist.io/v1alpha1
kind: AccessPolicy
metadata:
  name: healthy-boundaries-baseline
spec:
  rationale: Baseline healthy-boundary read access for e2e inheritance checks.
  subjects:
    - teamRef:
        name: freud-fellows
  roles:
    - clusterRole: view
      namespaces:
        names:
          - platform-monitoring
---
apiVersion: rbac.therapist.io/v1alpha1
kind: AccessPolicy
metadata:
  name: gottman-repair-protocol
spec:
  rationale: Gottman guides need admin plus inherited read access for incident response.
  extends:
    - name: healthy-boundaries-baseline
  subjects:
    - teamRef:
        name: gottman-guides
  roles:
    - clusterRole: admin
      namespaces:
        names:
          - platform-monitoring
---
apiVersion: rbac.therapist.io/v1alpha1
kind: AccessPolicy
metadata:
  name: boundary-builders-edit
spec:
  rationale: Boundary builders need edit permissions in staging namespaces.
  subjects:
    - teamRef:
        name: boundary-builders
  roles:
    - clusterRole: edit
      namespaces:
        selector:
          matchLabels:
            tier: app
          matchExpressions:
            - key: env
              operator: In
              values: ["staging"]
---
apiVersion: rbac.therapist.io/v1alpha1
kind: AccessPolicy
metadata:
  name: freud-tag-intake-view
spec:
  rationale: Team tags should drive intake namespace access using matchTeamTags.
  subjects:
    - teamRef:
        name: freud-fellows
  roles:
    - clusterRole: view
      namespaces:
        matchTeamTags: true
