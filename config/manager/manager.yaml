---
apiVersion: v1
kind: Namespace
metadata:
  name: rbac-therapist-system
  labels:
    app.kubernetes.io/name: rbac-therapist
    app.kubernetes.io/component: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-therapist-controller-manager
  namespace: rbac-therapist-system
  labels:
    app.kubernetes.io/name: rbac-therapist
    app.kubernetes.io/component: controller-manager
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbac-therapist
        control-plane: controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: rbac-therapist-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/rbac-therapist/rbac-therapist:latest
          imagePullPolicy: IfNotPresent
          command:
            - /operator
          args:
            - --leader-elect=true
            - --enable-webhooks=true
            - --session-refresh-interval=5m
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      terminationGracePeriodSeconds: 10
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: rbac-therapist-webhook-server-cert
---
apiVersion: v1
kind: Service
metadata:
  name: rbac-therapist-controller-manager-metrics-service
  namespace: rbac-therapist-system
  labels:
    app.kubernetes.io/name: rbac-therapist
    control-plane: controller-manager
spec:
  ports:
    - name: metrics
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    control-plane: controller-manager
