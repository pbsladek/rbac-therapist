---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rbac-therapist-manager-role
rules:
  # rbac-therapist CRDs
  - apiGroups: [rbac.therapist.io]
    resources: [accesspolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.therapist.io]
    resources: [accesspolicies/status]
    verbs: [get, update, patch]
  - apiGroups: [rbac.therapist.io]
    resources: [accesspolicies/finalizers]
    verbs: [update]
  - apiGroups: [rbac.therapist.io]
    resources: [teams]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.therapist.io]
    resources: [teams/status]
    verbs: [get, update, patch]
  - apiGroups: [rbac.therapist.io]
    resources: [teams/finalizers]
    verbs: [update]
  - apiGroups: [rbac.therapist.io]
    resources: [rbacbindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.therapist.io]
    resources: [rbacbindings/status]
    verbs: [get, update, patch]
  - apiGroups: [rbac.therapist.io]
    resources: [rbacbindings/finalizers]
    verbs: [update]
  - apiGroups: [rbac.therapist.io]
    resources: [rbacsessions]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.therapist.io]
    resources: [rbacsessions/status]
    verbs: [get, update, patch]
  # Kubernetes RBAC resources (managed bindings)
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterrolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles, roles]
    verbs: [get, list, watch, create, update, patch, delete]
  # Core resources
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  # Leader election
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
