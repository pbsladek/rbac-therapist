---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: rbacsessions.rbac.therapist.io
spec:
  group: rbac.therapist.io
  names:
    categories:
    - rbac-therapist
    kind: RBACSession
    listKind: RBACSessionList
    plural: rbacsessions
    shortNames:
    - session
    singular: rbacsession
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.generatedAt
      name: Generated
      type: date
    - description: Number of tracked subjects
      jsonPath: .status.subjectAccess
      name: Subjects
      type: integer
    - description: Number of warnings
      jsonPath: .status.warnings
      name: Warnings
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RBACSession is the case notes: a point-in-time snapshot of all RBAC access
          managed by rbac-therapist. It is generated and updated by the operator.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: RBACSessionSpec is empty — RBACSession resources are generated by the operator.
            type: object
          status:
            description: RBACSessionStatus is the full observed RBAC state of the cluster.
            properties:
              generatedAt:
                description: GeneratedAt is the time this snapshot was generated.
                format: date-time
                type: string
              namespaceAccess:
                description: NamespaceAccess is the access index keyed by namespace.
                items:
                  properties:
                    grants:
                      items:
                        properties:
                          policyRef:
                            type: string
                          role:
                            type: string
                          subject:
                            properties:
                              apiGroup:
                                type: string
                              kind:
                                type: string
                              name:
                                type: string
                              namespace:
                                type: string
                            required:
                            - kind
                            - name
                            type: object
                        required:
                        - policyRef
                        - role
                        - subject
                        type: object
                      type: array
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                    namespace:
                      type: string
                  required:
                  - namespace
                  type: object
                type: array
              policySummaries:
                description: PolicySummaries provides a high-level summary of each active AccessPolicy.
                items:
                  properties:
                    effectiveSubjectCount:
                      type: integer
                    expiresAt:
                      format: date-time
                      type: string
                    managedBindingCount:
                      type: integer
                    name:
                      type: string
                    paused:
                      type: boolean
                    rationale:
                      type: string
                  required:
                  - effectiveSubjectCount
                  - managedBindingCount
                  - name
                  - rationale
                  type: object
                type: array
              subjectAccess:
                description: SubjectAccess is the full index of access, keyed by subject.
                items:
                  properties:
                    access:
                      items:
                        properties:
                          clusterWide:
                            type: boolean
                          namespace:
                            type: string
                          role:
                            type: string
                          roleKind:
                            type: string
                          via:
                            properties:
                              matchReason:
                                type: string
                              policyKind:
                                type: string
                              policyRef:
                                type: string
                              rationale:
                                type: string
                              teamRef:
                                type: string
                            required:
                            - policyKind
                            - policyRef
                            - rationale
                            type: object
                        required:
                        - role
                        - roleKind
                        - via
                        type: object
                      type: array
                    subject:
                      properties:
                        apiGroup:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    teams:
                      items:
                        type: string
                      type: array
                  required:
                  - subject
                  type: object
                type: array
              warnings:
                description: Warnings are non-fatal issues detected during snapshot generation.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
