name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (envtest, Go 1.26.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.26.x"
          cache: true

      - name: Show Go Version
        run: go version

      - name: Download Dependencies
        run: go mod download

      - name: Run Unit Test Pipeline
        run: make test

  build:
    name: Build (Go 1.26.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.26.x"
          cache: true

      - name: Show Go Version
        run: go version

      - name: Download Dependencies
        run: go mod download

      - name: Build Binaries
        run: make build

  parser-bench:
    name: Parser Benchmarks (${{ matrix.bench_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bench_name: BenchmarkParse_ABACLarge
            max_ns_per_op: "5000000000"
          - bench_name: BenchmarkParse_ManyInlineSubjects
            max_ns_per_op: "500000000"
    env:
      EXPECTED_BENCH_NAME: ${{ matrix.bench_name }}
      MAX_NS_PER_OP: ${{ matrix.max_ns_per_op }}
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.26.x"
          cache: true

      - name: Show Go Version
        run: go version

      - name: Download Dependencies
        run: go mod download

      - name: Run Parser Benchmark Guard
        run: bash hack/ci/benchmark_parser.sh
